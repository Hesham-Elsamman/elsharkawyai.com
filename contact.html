    <title>Sharkawy Ai - Contact</title>
  </head>
  <body data-page="contact" class="bg-base-100 text-base-content hide-scrollbar">
    <header id="main-navbar"></header>



    <main id="app">
      <!-- 1. Hero Section -->
      <section class="contact-hero text-center px-5">
        <h1 class="contact-title" data-i18n="contact.hero.title">LET'S CREATE<br><span class="text-primary">SOMETHING AMAZING</span></h1>
        <p class="contact-subtitle mt-4" data-i18n="contact.hero.subtitle">Join our success — you're the next client!</p>
      </section>

      <!-- 2. Bento Grid Section -->
      <section class="px-5">
        <div class="bento-grid">
          
          <!-- Connect / Email Card -->
          <div class="bento-card bento-email">
            <span class="card-label" data-i18n="contact.bento.email.label">Drop a line</span>
            <div class="email-row">
              <a href="mailto:asharkawy267@gmail.com" class="email-address-link">asharkawy267@gmail.com</a>
              <button id="copyEmailBtn" class="copy-btn">
                <i class="fi fi-rr-copy"></i>
                <span class="copy-text" data-i18n="contact.bento.email.copy">Copy</span>
              </button>
            </div>
          </div>

          <!-- Social Hub Card -->
          <div class="bento-card bento-social">
            <span class="card-label mb-6" data-i18n="contact.bento.social.title">Social Presence</span>
            <div class="social-links-grid">
              <a href="http://wa.me/201144820078" target="_blank" class="social-item social-whatsapp">
                <i class="fi fi-brands-whatsapp"></i>
                <span>WhatsApp</span>
              </a>
              <a href="https://t.me/Qww1ww" target="_blank" class="social-item social-telegram">
                <i class="fi fi-brands-telegram"></i>
                <span>Telegram</span>
              </a>
              <a href="https://www.instagram.com/adham_shrakawy?igsh=MTRsdWQ2amRmazBhMg%3D%3D&utm_source=qr" target="_blank" class="social-item social-instagram">
                <i class="fi fi-brands-instagram"></i>
                <span>Instagram</span>
              </a>
              <a href="https://www.facebook.com/share/1Cwpt9PpV3/?mibextid=wwXIfr" target="_blank" class="social-item social-facebook">
                <i class="fi fi-brands-facebook"></i>
                <span>Facebook</span>
              </a>
            </div>
          </div>

          <!-- Phone Lines Card -->
          <div class="bento-card bento-phone">
            <span class="card-label" data-i18n="contact.bento.phone.title">Direct Lines</span>
            <div class="phone-lines-wrapper">
              <a href="tel:+201144820078" class="phone-line" style="text-decoration: none;">
                <div class="phone-icon"><i class="fi fi-rr-phone-call"></i></div>
                <div class="phone-details">
                  <span class="phone-type" data-i18n="contact.bento.phone.label1">Main</span>
                  <span class="phone-number">+20 114 482 0078</span>
                </div>
              </a>
              <a href="tel:+201557913665" class="phone-line" style="text-decoration: none;">
                <div class="phone-icon"><i class="fi fi-rr-smartphone"></i></div>
                <div class="phone-details">
                  <span class="phone-type" data-i18n="contact.bento.phone.label2">Secondary</span>
                  <span class="phone-number">+20 155 791 3665</span>
                </div>
              </a>
            </div>
          </div>

          <!-- Location Map Card -->
          <div class="bento-card bento-map">
            <div class="map-container">
              <iframe
                class="map-frame"
                src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d7460.897811699751!2d31.277681886185295!3d30.0389141304549!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2seg!4v1762936308143!5m2!1sen!2seg"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
              ></iframe>
              <div class="map-overlay">
                <i class="fi fi-rr-marker"></i>
                <div class="flex flex-col">
                  <span class="text-xs text-white/50 uppercase tracking-widest" data-i18n="contact.bento.location.title">Based in</span>
                  <span class="text-sm" data-i18n="contact.bento.location.desc">Al Gamaliya, Cairo, Egypt</span>
                </div>
              </div>
            </div>
          </div>

        </div>
      </section>

    <script src="src/js/theme.js"></script>

    <script src="src/js/contact.js"></script>
    
    <script src="src/js/text.js"></script>
    <script src="src/js/cursor.js"></script>
    <script src="node_modules/flyonui/flyonui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
             if(typeof Swiper !== 'undefined') {
                if(document.querySelector('.mySwiper')) {
                    new Swiper(".mySwiper", {
                      loop: true, effect: "fade", centeredSlides: true,
                      autoplay: { delay: 5000, disableOnInteraction: false },
                      allowTouchMove: false, scrollbar: { el: ".swiper-scrollbar", hide: true }
                    });
                }
                if(document.querySelector('.mySwiper2')) {
                    new Swiper(".mySwiper2", {
                      loop: true, autoplay: { delay: 4500, disableOnInteraction: false },
                      slidesPerView: 1, spaceBetween: 20,
                      pagination: { el: ".mySwiper2 .swiper-pagination", clickable: true },
                      navigation: { nextEl: ".mySwiper2 .swiper-button-next", prevEl: ".mySwiper2 .swiper-button-prev" },
                      breakpoints: { 768: { slidesPerView: 2 }, 1024: { slidesPerView: 3 } }
                    });
                }
             }
        });
    </script>
  </body>
